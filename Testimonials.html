<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParchD | Testimonials</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="testimonials-page">

  <header>
    <h1>ParchD</h1>

    <nav>
      <a href="index.html">Home</a>
      <a href="About.html">About Us</a>
      <a href="Products.html">Products</a>
      <a href="Shop.html">Shop</a>
      <a href="Testimonials.html">Testimonials</a>
      <a href="FAQ.html">FAQ</a>
      <a href="Contact.html">Contact Us</a>
    </nav>

    <p>Cart</p>
  </header>

 <main>
  <section>
    <h2>What Our Customers Say</h2>
    <p>Real people. Real results.</p>
  </section>

  <section class="rating-summary">
    <h3>Overall Rating</h3>
    <p id="average-rating">0.0/5</p>
    <p id="review-count">0 reviews</p>
  </section>

  <section>
    <h3>Filter Reviews</h3>
    <button type="button" onclick="filterReviews('all')">All</button>
    <button type="button" onclick="filterReviews(5)">5★</button>
    <button type="button" onclick="filterReviews(4)">4★</button>
    <button type="button" onclick="filterReviews(3)">3★</button>
    <button type="button" onclick="filterReviews(2)">2★</button>
    <button type="button" onclick="filterReviews(1)">1★</button>
  </section>

  <section id="reviews-container"></section>

  <section>
    <h3>Leave a Review</h3>

    <form id="review-form">
      <p>
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required>
      </p>

      <p>
        <label>Rating:</label><br>
        <button type="button" class="star" data-value="1" aria-label="1 star">☆</button>
        <button type="button" class="star" data-value="2" aria-label="2 stars">☆</button>
        <button type="button" class="star" data-value="3" aria-label="3 stars">☆</button>
        <button type="button" class="star" data-value="4" aria-label="4 stars">☆</button>
        <button type="button" class="star" data-value="5" aria-label="5 stars">☆</button>
      </p>

      <p id="rating-text">Selected: 0 stars</p>

      <p>
        <label for="comment">Review:</label><br>
        <textarea id="comment" name="comment" rows="5" required></textarea>
      </p>

      <p>
        <button type="submit">Submit Review</button>
      </p>
    </form>
  </section>
</main>

  <footer>
    <p>
      <a href="https://www.facebook.com/share/1RYqaPEzoC/?mibextid=wwXIfr">Facebook</a>
      <a href="https://www.instagram.com/parchd_bw?igsh=MWkwdnk4OG5qeWJ5MQ==">Instagram</a>
      <a href="https://wa.me/">WhatsApp</a>
    </p>

    <p>&copy; 2026 ParchD. All rights reserved.</p>
  </footer>

  <script src="testimonials.js"></script>
</body>
</html>
